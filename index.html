<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Game Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121c;
    --card: #1a1a28;
    --border: #2a2a40;
    --neon: #00f5c4;
    --neon2: #7c3aed;
    --accent: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,245,196,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .stars {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    margin-bottom: 0.5rem;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,245,196,0.4));
    animation: pulse-logo 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,245,196,0.4)); }
    50% { filter: drop-shadow(0 0 40px rgba(0,245,196,0.7)); }
  }
  .tagline {
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4rem;
  }
  .subtitle {
    color: var(--neon);
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }
  .players-grid {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    min-width: 180px;
  }
  .player-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon2), var(--neon));
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }
  .player-card:hover::before { transform: scaleX(1); }
  .player-card:hover {
    border-color: var(--neon);
    box-shadow: 0 0 30px rgba(0,245,196,0.15);
    transform: translateY(-4px);
    background: #1e1e30;
  }
  .player-avatar {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .player-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
  }
  .player-grade {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .badge {
    display: inline-block;
    background: rgba(0,245,196,0.1);
    border: 1px solid rgba(0,245,196,0.3);
    color: var(--neon);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    margin-top: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .footer {
    position: fixed;
    bottom: 1.5rem;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #1a1a28;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%; max-width: 340px;
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.25s ease;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-avatar { font-size: 3rem; margin-bottom: 0.8rem; }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 700;
    color: var(--text); margin-bottom: 0.3rem; letter-spacing: 2px;
  }
  .modal-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.8rem; }
  .pw-input {
    width: 100%;
    background: #12121c;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    letter-spacing: 6px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .pw-input:focus { border-color: var(--neon); }
  .pw-input.error { border-color: #ef4444; animation: shake 0.35s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  .pw-error {
    font-size: 0.8rem; color: #ef4444;
    margin-bottom: 1rem; min-height: 1rem;
  }
  .enter-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--neon2), #4f46e5);
    color: white; border: none;
    padding: 0.85rem; border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem; letter-spacing: 3px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(124,58,237,0.3);
  }
  .enter-btn:hover { transform: translateY(-2px); }
  .close-btn {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer; transition: color 0.2s;
    line-height: 1;
  }
  .close-btn:hover { color: var(--text); }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="logo">MATH ARENA</div>
  <div class="tagline">Training Ground for Math Champions</div>

  <div class="subtitle">— Select Player —</div>
  <div class="players-grid">
    <div class="player-card" onclick="openModal()">
      <span class="player-avatar">🎮</span>
      <div class="player-name">ASFA</div>
      <div class="player-grade">Kelas 8 · SMP</div>
      <div class="badge">Active</div>
    </div>
  </div>
</div>

<div class="footer">Math Arena · Powered by Brain</div>

<!-- Password Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-avatar">🎮</div>
    <div class="modal-title">ASFA</div>
    <div class="modal-sub">Masukkan password untuk masuk</div>
    <input
      class="pw-input"
      id="pwInput"
      type="password"
      maxlength="20"
      placeholder="••••"
      onkeydown="if(event.key==='Enter') tryEnter()"
      oninput="clearError()"
    />
    <div class="pw-error" id="pwError"></div>
    <button class="enter-btn" onclick="tryEnter()">ENTER →</button>
  </div>
</div>

<script>
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --d: ${2+Math.random()*4}s;
      --delay: ${-Math.random()*4}s;
      width: ${1+Math.random()*2}px;
      height: ${1+Math.random()*2}px;
    `;
    stars.appendChild(s);
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 250);
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('pwInput').value = '';
    clearError();
  }
  function clearError() {
    document.getElementById('pwError').textContent = '';
    document.getElementById('pwInput').classList.remove('error');
  }
  function tryEnter() {
    const val = document.getElementById('pwInput').value;
    if (val === 'ayokitabisa') {
      window.location.href = 'asfa_1195.html';
    } else {
      const inp = document.getElementById('pwInput');
      inp.classList.remove('error');
      void inp.offsetWidth;
      inp.classList.add('error');
      document.getElementById('pwError').textContent = 'Password salah, coba lagi!';
      inp.value = '';
    }
  }
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
