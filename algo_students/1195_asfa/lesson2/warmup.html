<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warmup · Lesson 2 · Asfa</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/logo1.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --card: #1a1a28; --border: #2a2a40;
    --neon: #00f5c4; --neon2: #7c3aed; --accent: #f59e0b;
    --red: #ef4444; --text: #e2e8f0; --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(239,68,68,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  nav {
    padding: 1rem 2rem; display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
    font-family: 'Orbitron', monospace; font-size: 0.72rem; letter-spacing: 1px;
  }
  nav a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  nav a:hover { color: var(--neon); }
  nav span { color: var(--border); }
  nav .current { color: #f87171; }
  .wrapper { max-width: 640px; margin: 0 auto; padding: 3rem 1.5rem 6rem; position: relative; z-index: 1; }

  /* Intro */
  #intro { text-align: center; }
  .warmup-icon { font-size: 5rem; display: block; margin-bottom: 1.5rem; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  .warmup-title {
    font-family: 'Orbitron', monospace; font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 900;
    color: #f87171; margin-bottom: 0.8rem;
    text-shadow: 0 0 30px rgba(239,68,68,0.4);
  }
  .warmup-sub { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; font-size: 0.95rem; }
  .info-cards {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem;
    margin-bottom: 2.5rem;
  }
  @media(max-width:480px){ .info-cards { grid-template-columns: 1fr; } }
  .info-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.2rem; text-align: center;
  }
  .info-val {
    font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900;
    color: var(--neon); margin-bottom: 0.3rem;
  }
  .info-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .start-btn {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white; font-weight: 800;
    padding: 1rem 3rem; border-radius: 14px; border: none;
    font-family: 'Orbitron', monospace; font-size: 1rem;
    letter-spacing: 3px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(239,68,68,0.5); }

  /* Game */
  #game { display: none; }
  .hud {
    display: flex; justify-content: space-between; align-items: stretch;
    margin-bottom: 1.5rem; gap: 0.8rem;
  }
  .hud-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.7rem 1.2rem; text-align: center; flex: 1;
  }
  .hud-val { font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 700; }
  .hud-lbl { font-size: 0.62rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 0.1rem; }
  .hud-val.score-v { color: var(--neon); }
  .hud-val.q-v { color: var(--accent); }
  .hud-val.timer-v { color: var(--text); transition: color 0.3s; }
  .hud-val.timer-v.warn { color: var(--red); animation: blink 0.5s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* Timer ring */
  .timer-wrap { position: relative; display: inline-block; }
  .timer-svg { position: absolute; top: -6px; left: -6px; width: calc(100% + 12px); height: calc(100% + 12px); }

  .phase-tag {
    text-align: center;
    font-family: 'Orbitron', monospace; font-size: 0.65rem;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 0.8rem;
  }
  .phase-easy { color: #4ade80; }
  .phase-medium { color: #fb923c; }

  .q-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem 2rem; text-align: center;
    margin-bottom: 1.2rem; animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
  .q-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 900;
    color: var(--text); margin-bottom: 1.5rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.1);
  }
  .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  @media(max-width:400px){ .opts-grid { grid-template-columns: 1fr; } }
  .opt {
    background: #12121c; border: 2px solid var(--border);
    color: var(--text); padding: 1rem;
    border-radius: 14px; cursor: pointer;
    font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 700;
    transition: all 0.15s; text-align: center;
  }
  .opt:hover:not(:disabled) { border-color: var(--neon); background: rgba(0,245,196,0.06); }
  .opt.correct { border-color: var(--neon); background: rgba(0,245,196,0.12); color: var(--neon); }
  .opt.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }
  .opt:disabled { cursor: default; }
  .q-feedback {
    margin-top: 1rem; padding: 0.9rem 1.2rem;
    border-radius: 12px; font-size: 0.9rem; font-weight: 700;
    display: none; line-height: 1.5;
  }
  .q-feedback.show { display: block; animation: fadeUp 0.3s ease; }
  .q-feedback.ok { background: rgba(0,245,196,0.1); color: var(--neon); border: 1px solid rgba(0,245,196,0.3); }
  .q-feedback.no { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .next-btn {
    width: 100%; padding: 1rem; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--neon2), #4f46e5);
    color: white; font-family: 'Orbitron', monospace;
    font-size: 0.85rem; letter-spacing: 3px; cursor: pointer;
    margin-top: 1rem; display: none; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(124,58,237,0.3);
  }
  .next-btn:hover { transform: translateY(-2px); }
  .next-btn.show { display: block; animation: fadeUp 0.3s ease; }

  /* Results */
  #results { display: none; text-align: center; }
  .result-icon { font-size: 5rem; display: block; margin-bottom: 1.5rem; animation: pulse 1s infinite; }
  .result-grade {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; margin-bottom: 0.5rem;
  }
  .result-label { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--muted); letter-spacing: 3px; margin-bottom: 2rem; }
  .score-breakdown {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; text-align: left;
  }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.45rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row .qtext { color: var(--muted); }
  .verdict.ok { color: var(--neon); font-family: 'Orbitron', monospace; font-size: 0.75rem; }
  .verdict.no { color: var(--red); font-family: 'Orbitron', monospace; font-size: 0.75rem; }
  .xp-badge {
    display: inline-block; background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.4); color: var(--accent);
    padding: 0.4rem 1.2rem; border-radius: 20px;
    font-family: 'Orbitron', monospace; font-size: 0.85rem; margin-bottom: 2rem;
  }
  .action-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 0.8rem 1.8rem; border-radius: 10px; border: none;
    font-family: 'Orbitron', monospace; font-size: 0.78rem;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--neon); color: var(--neon); }
  .btn-primary { background: linear-gradient(135deg,var(--neon2),#4f46e5); color: white; box-shadow: 0 4px 15px rgba(124,58,237,0.3); }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-accent { background: linear-gradient(135deg,#ef4444,#b91c1c); color: white; font-weight: 800; }
</style>
</head>
<body>

<nav>
  <a href="../../../index.html">ARENA</a>
  <span>›</span>
  <a href="../asfa_1195.html">ASFA</a>
  <span>›</span>
  <a href="lesson2.html">LESSON 2</a>
  <span>›</span>
  <span class="current">WARMUP</span>
</nav>

<div class="wrapper">

  <!-- Intro -->
  <div id="intro">
    <span class="warmup-icon">🔥</span>
    <div class="warmup-title">WARMUP TIME!</div>
    <div class="warmup-sub">
      Sebelum masuk perkalian 2 digit, kita panaskan dulu otakmu!<br>
      10 soal perkalian 1 digit — mulai dari yang santai, terus naik ke yang lebih nantang.
    </div>
    <div class="info-cards">
      <div class="info-card">
        <div class="info-val">10</div>
        <div class="info-lbl">Soal</div>
      </div>
      <div class="info-card">
        <div class="info-val">20s</div>
        <div class="info-lbl">Per Soal</div>
      </div>
      <div class="info-card">
        <div class="info-val">10</div>
        <div class="info-lbl">Poin/Soal</div>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">🔥 MULAI WARMUP</button>
  </div>

  <!-- Game -->
  <div id="game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-val score-v" id="scoreDisp">0</div>
        <div class="hud-lbl">Score</div>
      </div>
      <div class="hud-item">
        <div class="hud-val q-v" id="qDisp">1 / 10</div>
        <div class="hud-lbl">Soal</div>
      </div>
      <div class="hud-item">
        <div class="hud-val timer-v" id="timerDisp">20</div>
        <div class="hud-lbl">Detik</div>
      </div>
    </div>

    <div class="phase-tag" id="phaseTag"></div>

    <div class="q-card" id="qCard">
      <div class="q-text" id="qText">? × ? = ?</div>
      <div class="opts-grid" id="optsGrid"></div>
      <div class="q-feedback" id="qFb"></div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">SOAL BERIKUTNYA →</button>
  </div>

  <!-- Results -->
  <div id="results">
    <span class="result-icon" id="resIcon"></span>
    <div class="result-grade" id="resGrade"></div>
    <div class="result-label" id="resLabel"></div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <div class="xp-badge" id="xpBadge"></div>
    <div class="action-btns">
      <button class="btn btn-accent" onclick="restartGame()">🔄 Ulangi</button>
      <a href="lesson2.html" class="btn btn-ghost">← Lesson Hub</a>
      <a href="section1.html" class="btn btn-primary">Lanjut: Materi →</a>
    </div>
  </div>

</div>

<script>
// 10 soal: 3 easy (faktor < 5), 7 medium (ada faktor >= 6)
const questions = [
  // EASY — perkalian di bawah ×5
  { phase:'easy', text:'3 × 4 = ?', opts:[10, 12, 14, 9],   answer:12,  explain:'3×4 = 4+4+4 = 12 ✅' },
  { phase:'easy', text:'2 × 4 = ?', opts:[6,  8,  10, 12],  answer:8,   explain:'2×4 = 4+4 = 8 ✅' },
  { phase:'easy', text:'4 × 3 = ?', opts:[9,  10, 12, 14],  answer:12,  explain:'4×3 = 3+3+3+3 = 12 ✅' },
  // MEDIUM — ada faktor ≥ 6
  { phase:'medium', text:'6 × 4 = ?', opts:[20, 22, 24, 26], answer:24, explain:'6×4 = 6×(2+2) = 12+12 = 24 ✅' },
  { phase:'medium', text:'7 × 3 = ?', opts:[18, 19, 21, 23], answer:21, explain:'7×3 = 7+7+7 = 21 ✅' },
  { phase:'medium', text:'8 × 6 = ?', opts:[42, 44, 46, 48], answer:48, explain:'8×6 = 8×(5+1) = 40+8 = 48 ✅' },
  { phase:'medium', text:'9 × 7 = ?', opts:[58, 61, 63, 65], answer:63, explain:'9×7 = 7×(10−1) = 70−7 = 63 ✅' },
  { phase:'medium', text:'6 × 8 = ?', opts:[44, 46, 48, 50], answer:48, explain:'6×8 = 6×(10−2) = 60−12 = 48 ✅' },
  { phase:'medium', text:'7 × 9 = ?', opts:[61, 63, 65, 67], answer:63, explain:'7×9 = 7×(10−1) = 70−7 = 63 ✅' },
  { phase:'medium', text:'8 × 8 = ?', opts:[60, 62, 64, 66], answer:64, explain:'8×8 = 8×(10−2) = 80−16 = 64 ✅' },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let cur = 0, score = 0, timeLeft = 20, timer = null;
const results = [];

function startGame() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  const q = questions[cur];
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qDisp').textContent = `${cur+1} / ${questions.length}`;
  document.getElementById('qFb').className = 'q-feedback';
  document.getElementById('nextBtn').className = 'next-btn';

  const phaseTag = document.getElementById('phaseTag');
  if (q.phase === 'easy') {
    phaseTag.textContent = '🟢 Easy — Perkalian Kecil';
    phaseTag.className = 'phase-tag phase-easy';
  } else {
    phaseTag.textContent = '🟠 Medium — Perkalian Lebih Besar';
    phaseTag.className = 'phase-tag phase-medium';
  }

  const grid = document.getElementById('optsGrid');
  grid.innerHTML = '';
  shuffle(q.opts).forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = val;
    btn.onclick = () => answer(val, btn, q);
    grid.appendChild(btn);
  });

  // Re-animate card
  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  startTimer();
}

function startTimer() {
  timeLeft = 20;
  const disp = document.getElementById('timerDisp');
  disp.textContent = timeLeft;
  disp.className = 'hud-val timer-v';
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    disp.textContent = timeLeft;
    if (timeLeft <= 5) disp.className = 'hud-val timer-v warn';
    if (timeLeft <= 0) { clearInterval(timer); timeUp(); }
  }, 1000);
}

function answer(val, btn, q) {
  clearInterval(timer);
  const correct = val === q.answer;
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (Number(b.textContent) === q.answer) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  else score += 10;
  document.getElementById('scoreDisp').textContent = score;
  results.push({ text: q.text, correct });
  const fb = document.getElementById('qFb');
  fb.className = 'q-feedback show ' + (correct ? 'ok' : 'no');
  fb.textContent = (correct ? '✅ ' : '❌ ') + q.explain;
  document.getElementById('nextBtn').className = 'next-btn show';
}

function timeUp() {
  const q = questions[cur];
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (Number(b.textContent) === q.answer) b.classList.add('correct');
  });
  results.push({ text: q.text, correct: false });
  const fb = document.getElementById('qFb');
  fb.className = 'q-feedback show no';
  fb.textContent = '⏱️ Waktu habis! ' + q.explain;
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  cur++;
  if (cur >= questions.length) showResults();
  else loadQuestion();
}

function showResults() {
  document.getElementById('game').style.display = 'none';
  const resDiv = document.getElementById('results');
  resDiv.style.display = 'block';
  resDiv.style.animation = 'fadeUp 0.5s ease';

  const pct = score / 100;
  let icon, grade, label, xp;
  if (pct === 1)       { icon='🏆'; grade='100'; label='PERFECT WARMUP!'; xp='+100 XP — Pemanasan Sempurna!'; }
  else if (pct >= 0.8) { icon='🔥'; grade=score+''; label='SIAP TEMPUR!'; xp='+80 XP — Otak Udah Panas!'; }
  else if (pct >= 0.6) { icon='💪'; grade=score+''; label='HAMPIR SIAP!'; xp='+60 XP — Keep Going!'; }
  else if (pct >= 0.4) { icon='🎯'; grade=score+''; label='PERLU LATIHAN!'; xp='+40 XP — Terus Berlatih!'; }
  else                  { icon='🌱'; grade=score+''; label='YUK ULANGI!'; xp='+20 XP — Jangan Menyerah!'; }

  document.getElementById('resIcon').textContent = icon;
  const gradeEl = document.getElementById('resGrade');
  gradeEl.textContent = grade;
  gradeEl.style.color = pct === 1 ? 'var(--accent)' : pct >= 0.6 ? 'var(--neon)' : '#94a3b8';
  document.getElementById('resLabel').textContent = label;
  document.getElementById('xpBadge').textContent = '✨ ' + xp;

  const bd = document.getElementById('scoreBreakdown');
  bd.innerHTML = results.map((r,i) => `
    <div class="score-row">
      <span class="qtext">Soal ${i+1}: ${r.text}</span>
      <span class="verdict ${r.correct?'ok':'no'}">${r.correct ? '+10 ✅' : '0 ❌'}</span>
    </div>
  `).join('') + `
    <div class="score-row">
      <strong>Total</strong>
      <strong style="color:var(--neon);font-family:'Orbitron',monospace">${score} / 100</strong>
    </div>
  `;
}

function restartGame() {
  cur = 0; score = 0; results.length = 0;
  document.getElementById('results').style.display = 'none';
  document.getElementById('scoreDisp').textContent = '0';
  document.getElementById('game').style.display = 'block';
  loadQuestion();
}
</script>
</body>
</html>
